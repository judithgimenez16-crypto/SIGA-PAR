<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIGA-PY Consultor Master v8.0 - Lógica Inteligente</title>
    <!-- Estilos CSS (Sin cambios, para mantener tu UI intacta) -->
    <style>
        :root { --color-primario: #1b4332; --color-secundario: #2d6a4f; --color-azul: #2b6cb0; --color-fondo: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--color-fondo); color: #2d3748; margin: 0; padding: 20px; }
        .container { display: flex; max-width: 1600px; margin: auto; gap: 30px; }
        .panel-config { flex: 1; background: #fff; padding: 25px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); border-top: 5px solid var(--color-primario); }
        .seccion-form { background: #f8fafc; padding: 15px; border-radius: 8px; margin-bottom: 15px; border: 1px solid #e2e8f0; }
        select, input { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #cbd5e1; border-radius: 6px; }
        .btn-generar { width: 100%; background-color: var(--color-primario); color: white; border: none; padding: 14px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .panel-resultado { flex: 1.3; background: #fff; padding: 35px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); }
        .oculto { display: none; }
    </style>
</head>
<body>

<div class="container">
    <aside class="panel-config">
        <h2>Configurador Inteligente</h2>
        <form id="form-ambiental">
            <!-- PASO 1: INSTRUMENTO (FILTRO MAESTRO) -->
            <div class="seccion-form">
                <h3>1. Instrumento Ambiental</h3>
                <select id="instrumento" onchange="filtrarActividades()" required>
                    <option value="">-- Seleccione el Trámite --</option>
                    <option value="EIA">Estudio de Impacto Ambiental (EIA)</option>
                    <option value="RIMA">Relatorio de Impacto Ambiental (RIMA)</option>
                    <option value="EDE">Estudio de Disposición de Efluentes (EDE)</option>
                    <option value="PGA">Plan de Gestión Ambiental (PGA)</option>
                    <option value="AA">Auditoría Ambiental (AA)</option>
                </select>
            </div>

            <!-- PASO 2: ACTIVIDADES (DINÁMICO) -->
            <div class="seccion-form">
                <h3>2. Actividad Regulada</h3>
                <select id="actividad" required>
                    <option value="">-- Seleccione primero el instrumento --</option>
                </select>
            </div>

            <!-- APARTADO ESPECIAL: PLAN DE CIERRE -->
            <div class="seccion-form" id="apartado-cierre" style="display:none; background: #fff7ed;">
                <h3>3. Módulo de Cierre (Condicional)</h3>
                <div class="campo-checkbox">
                    <input type="checkbox" id="requiere-cierre">
                    <label for="requiere-cierre"><b>¿Activar Plan de Cierre y Recomposición?</b></label>
                </div>
            </div>

            <button type="button" class="btn-generar" onclick="generarGuia()">Generar Guía de Expediente</button>
        </form>
    </aside>

    <main class="panel-resultado" id="resultado">
        <div class="mensaje-vacio">Seleccione los parámetros para generar su checklist lógico.</div>
    </main>
</div>

<script>
    const mapeo = {
        'EIA': ['urbanizaciones', 'ganaderia', 'industrias', 'canteras', 'residuos_urbanos'],
        'RIMA': ['urbanizaciones', 'industrias', 'canteras', 'residuos_urbanos'],
        'EDE': ['industrias', 'estaciones', 'hospitales'],
        'PGA': ['urbanizaciones', 'ganaderia', 'industrias'],
        'AA': ['urbanizaciones', 'ganaderia', 'industrias', 'canteras', 'estaciones']
    };

    function filtrarActividades() {
        const inst = document.getElementById('instrumento').value;
        const selectAct = document.getElementById('actividad');
        const apartadoCierre = document.getElementById('apartado-cierre');
        
        selectAct.innerHTML = '<option value="">-- Seleccione Actividad --</option>';
        if (!inst) return;

        mapeo[inst].forEach(act => {
            let opt = document.createElement('option');
            opt.value = act;
            opt.textContent = act.toUpperCase();
            selectAct.appendChild(opt);
        });

        // Mostrar cierre solo para actividades críticas
        apartadoCierre.style.display = (inst === 'AA' || inst === 'EIA') ? 'block' : 'none';
    }

    function generarGuia() {
        // Lógica de generación de Checklist basada en las selecciones
        const inst = document.getElementById('instrumento').value;
        const cierre = document.getElementById('requiere-cierre').checked;
        
        let html = `<h2>Checklist para Expediente: ${inst}</h2><ul>`;
        html += `<li>Validar formulario SIAM según Res. 281/19.</li>`;
        html += `<li>Adjuntar mapas vectoriales en formato .shp (Res. 251/18).</li>`;
        
        if (cierre) {
            html += `<li><b>Módulo de Cierre Activo:</b> Incorporar Plan de Recomposición (Ley 3180/07).</li>`;
        }
        
        html += `</ul><button onclick="window.print()">Imprimir Checklist</button>`;
        document.getElementById('resultado').innerHTML = html;
    }
</script>
</body>
</html>
